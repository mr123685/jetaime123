<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>Abdoullah ❤️</title>

<link href="https://fonts.googleapis.com/css2?family=Great+Vibes&display=swap" rel="stylesheet">

<style>
body {
    margin: 0;
    background: linear-gradient(135deg, #ff9a9e, #fad0c4);
    font-family: Arial, sans-serif;
    height: 100vh;
    display: flex;
    justify-content: center;
    align-items: center;
    overflow: hidden;
}

/* CONTENEUR PRINCIPAL */
.container {
    text-align: center;
    display: flex;
    flex-direction: column;
    align-items: center;
}

/* TITRE */
h1 {
    font-family: 'Great Vibes', cursive;
    font-size: 70px;
    color: white;
    margin: 0 0 20px 0;
    animation: glow 2s infinite alternate;
}

@keyframes glow {
    from { text-shadow: 0 0 10px #fff; }
    to { text-shadow: 0 0 25px #ff4b6e; }
}

/* BOUTON */
button {
    padding: 15px 30px;
    font-size: 18px;
    border: none;
    border-radius: 30px;
    background: white;
    color: #ff4b6e;
    cursor: pointer;
    transition: 0.3s;
    margin-bottom: 20px;
}

button:hover {
    transform: scale(1.1);
}

/* ZONE FIXE POUR ÉVITER LES DÉPLACEMENTS */
.area {
    height: 350px;
    width: 300px;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
}

.heart {
    font-size: 80px;
    display: none;
    animation: pulse 1s infinite;
}

.message {
    font-size: 22px;
    color: white;
    margin-top: 15px;
    display: none;
}

.photo {
    width: 250px;
    border-radius: 20px;
    margin-top: 15px;
    display: none;
}

@keyframes pulse {
    0% { transform: scale(1); }
    50% { transform: scale(1.2); }
    100% { transform: scale(1); }
}

/* CŒURS FLOTTANTS */
.floating-heart {
    position: absolute;
    color: white;
    animation: floatUp 6s linear infinite;
    opacity: 0.7;
}

@keyframes floatUp {
    0% { transform: translateY(100vh); opacity: 0; }
    50% { opacity: 1; }
    100% { transform: translateY(-10vh); opacity: 0; }
}
</style>
</head>

<body>

<div class="container">

    <h1>Abdoullah ❤️</h1>

    <button onclick="cycle()">Je t'aime</button>

    <div class="area">
        <div id="heart" class="heart">❤️</div>
        <div id="message" class="message">
         Mon cœur te choisira pour toujours ❤️ <br>💖 12.12.25 💖 <br />
        </div>
        <img id="photo" class="photo" src="photo.jpg">
    </div>

</div>

<audio id="music" src="piano.mp3"></audio>

<script>
let state = 0;
let musicStarted = false;

function cycle() {
    const heart = document.getElementById("heart");
    const message = document.getElementById("message");
    const photo = document.getElementById("photo");
    const music = document.getElementById("music");

    state++;

    if (!musicStarted) {
        music.play();
        musicStarted = true;
    }

    if (state === 1) {
        heart.style.display = "block";
        message.style.display = "block";
        photo.style.display = "none";
    }

    else if (state === 2) {
        heart.style.display = "none";
        message.style.display = "none";
        photo.style.display = "none";
    }

    else if (state === 3) {
        heart.style.display = "none";
        message.style.display = "none";
        photo.style.display = "block";
        state = 0;
    }
}

/* Génération des cœurs */
setInterval(() => {
    const heart = document.createElement("div");
    heart.className = "floating-heart";
    heart.innerHTML = "❤️";
    heart.style.left = Math.random() * 100 + "vw";
    heart.style.fontSize = (15 + Math.random() * 20) + "px";
    document.body.appendChild(heart);

    setTimeout(() => heart.remove(), 6000);
}, 800);
</script>

</body>
</html>
